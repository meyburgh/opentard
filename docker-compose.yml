version: "3.8"
services:
  wa-bridge:
    build:
      context: ../ot-wap/sidecar
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - WEBHOOK_URL=http://ot-wap:8080
    volumes:
      - wa-auth-state:/app/auth_state
      - wa-media-cache:/app/media_cache
    restart: unless-stopped

  ot-wap:
    build:
      context: ../ot-wap
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - WHATSAPP__BRIDGEURL=http://wa-bridge:3001
    depends_on:
      - wa-bridge
    restart: unless-stopped

  tard:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - ot-wap
    environment:
      - TARD__OTWAPURL=http://ot-wap:8080
      - TARD__ANTHROPICAPIKEY=${ANTHROPIC_API_KEY}
      - TARD__ANTHROPICMODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - TARD__POLLINGINTERVALMS=3000
      - TARD__MEMORYSTOREPATH=/data/memory
    volumes:
      - tard-memory:/data/memory
    restart: unless-stopped

volumes:
  wa-auth-state:
  wa-media-cache:
  tard-memory:
